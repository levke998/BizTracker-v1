services:
  db:
    image: postgres:18
    container_name: biztracker-postgres
    environment:
      POSTGRES_DB: biztracker
      POSTGRES_USER: biztracker
      POSTGRES_PASSWORD: biztracker_dev
    ports:
      - "${BIZTRACKER_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biztracker -d biztracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - biztracker_postgres_data:/var/lib/postgresql/data

volumes:
  biztracker_postgres_data:
