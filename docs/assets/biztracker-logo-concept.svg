<svg width="360" height="92" viewBox="0 0 360 92" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BizTracker logo concept</title>
  <desc id="desc">Minimal BizTracker logo concept with an Activity line icon and purple cyan gradient accent.</desc>
  <defs>
    <linearGradient id="bt-icon-gradient" x1="12" y1="14" x2="76" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.5" stop-color="#D946EF"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="bt-text-gradient" x1="92" y1="24" x2="274" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.58" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#BEEBFF"/>
    </linearGradient>
    <filter id="bt-soft-glow" x="-18" y="-18" width="128" height="128" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.545 0 0 0 0 0.361 0 0 0 0 0.965 0 0 0 0.36 0" result="glow"/>
      <feBlend in="SourceGraphic" in2="glow" mode="normal"/>
    </filter>
  </defs>
  <rect x="0.5" y="0.5" width="359" height="91" rx="24" fill="#0B1020"/>
  <rect x="0.5" y="0.5" width="359" height="91" rx="24" stroke="url(#bt-icon-gradient)" stroke-opacity="0.18"/>
  <g filter="url(#bt-soft-glow)">
    <rect x="20" y="20" width="52" height="52" rx="16" fill="#10182D"/>
    <rect x="20.75" y="20.75" width="50.5" height="50.5" rx="15.25" stroke="url(#bt-icon-gradient)" stroke-opacity="0.72" stroke-width="1.5"/>
    <path d="M29 46H38L43 33L50 59L56 46H63" stroke="url(#bt-icon-gradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="92" y="55" fill="url(#bt-text-gradient)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="760" letter-spacing="0">BizTracker</text>
  <path d="M92 66H204" stroke="url(#bt-icon-gradient)" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
</svg>
